version: "3.9"

services:

  api:
    build: ./api
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  worker:
    build: ./worker
    depends_on:
      - redis
      - db

  streamlit:
    build: ./streamlit
    ports:
      - "8501:8501"
    depends_on:
      - api

  redis:
    image: redis:7

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: aiuser
      POSTGRES_PASSWORD: aipass
      POSTGRES_DB: ai_platform
    ports:
      - "5432:5432"
